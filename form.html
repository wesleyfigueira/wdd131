<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <header>
        <h1>Product Review</h1>
    </header>
    
    <form action="review.html" method="get">
        <label for="product">Product Name*</label>
        <select id="product" name="product" required>
            <option value="" disabled selected>Select a Product ...</option>
        </select>

        <fieldset>
            <legend>Overall Rating*</legend>
            <label><input class="radio" type="radio" name="rating" value="1" required> ☆</label>
            <label><input type="radio" name="rating" value="2"> ☆☆</label>
            <label><input type="radio" name="rating" value="3"> ☆☆☆</label>
            <label><input type="radio" name="rating" value="4"> ☆☆☆☆</label>
            <label><input type="radio" name="rating" value="5"> ☆☆☆☆☆</label>
        </fieldset>

        <label for="install-date">Date of Installation*</label>
        <input type="date" id="install-date" name="install-date" required>

        <fieldset>
            <legend>Useful Features (Check all that apply)</legend>
            <label><input type="checkbox" name="features" value="durability"> Durability</label>
            <label><input type="checkbox" name="features" value="ease-of-use"> Ease of Use</label>
            <label><input type="checkbox" name="features" value="design"> Design</label>
            <label><input type="checkbox" name="features" value="value"> Value for Money</label>
        </fieldset>

        <label for="review">Written Review</label>
        <textarea id="review" name="review"></textarea>

        <label for="username">Your Name</label>
        <input type="text" id="username" name="username">

        <input type="submit" value="Submit Review">
    </form>

    <footer>
        <p>&copy; <span id="year"></span> | Last Modified: <span id="lastModified"></span></p>
    </footer>

    <script src="scripts/script.js"></script>
</body>
</html>
